---
name: 🚀 Ansible Run

on: # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      check-mode:
        description: "Run in dry-run mode (ansible --check)"
        required: false
        default: false
        type: boolean
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      VAULT_PASSWORD:
        required: true
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ansible-playbook:
    name: Ansible Playbook
    runs-on: ubuntu-latest
    strategy:
      matrix:
        host:
          - amedee.be
          - box.vangasse.eu

    concurrency:
      group: ${{ format(
        'ansible-run-{0}-{1}-{2}',
        (inputs.check-mode && 'check-' || ''),
        matrix.host,
        github.ref) }}
      cancel-in-progress: true

    env:
      ANSIBLE_CONFIG: ansible.cfg
      ANSIBLE_STDOUT_CALLBACK: yaml
      CHECK_MODE_INPUT: ${{ inputs.check-mode }}
      GITHUB_EVENT: ${{ github.event_name }}
      GITHUB_REF: ${{ github.ref }}

    steps:
      - name: Collect Workflow Telemetry
        # yamllint disable-line rule:line-length
        uses: catchpoint/workflow-telemetry-action@94c3c3d9567a0205de6da68a76c428ce4e769af1 # v2.0.0

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Restore Ansible cache
        uses: ./.github/actions/restore-ansible-cache

      - name: Create controlmasters directory
        run: mkdir --parents ~/.ssh/controlmasters

      - name: Determine Ansible check mode
        id: set_check_mode
        run: |
          # Normalize the input to lowercase
          normalized="$(echo "${CHECK_MODE_INPUT:-false}" | tr '[:upper:]' '[:lower:]')"

          if [[ "$normalized" == "true" ]]; then
            # Always dry-run if input explicitly true
            check="--check"
          else
            case "$GITHUB_EVENT" in
              workflow_dispatch)
                check=""  # always real run
                ;;
              workflow_call|*)
                # Only real run on main branch, otherwise dry-run
                if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
                  check=""
                else
                  check="--check"
                fi
                ;;
            esac
          fi

          echo "check_mode=$check" >> "$GITHUB_OUTPUT"
          echo "🛠️ Ansible check mode set to: '$check'"

      - name: Deploy changes to servers
        # yamllint disable-line rule:line-length
        uses: dawidd6/action-ansible-playbook@126642a1c6ce512da255ef2b41e8ee90f0077474 # v9
        env:
          ANSIBLE_STDOUT_CALLBACK: default
          ANSIBLE_RESULT_FORMAT: yaml
        with:
          playbook: playbooks/site.yml
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          vault_password: ${{ secrets.VAULT_PASSWORD }}
          options: |
            --inventory inventory/production
            --limit ${{ matrix.host }}
            ${{ steps.set_check_mode.outputs.check_mode }}
            -vv

      - name: Archive Ansible log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ format(
            'ansible-{0}{1}.log',
            steps.set_check_mode.outputs.check_mode,
            matrix.host) }}
          path: ~/.ansible/ansible.log
          compression-level: 9
          overwrite: true

      - name: checkrun-timechart
        # yamllint disable-line rule:line-length
        uses: urcomputeringpal/checkrun-timechart-action@9de4251d7983342ccf09b84ed921326887571853 # v0.0.8
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          SUMMARY: "true"
