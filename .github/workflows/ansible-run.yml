---
name: 🚀 Ansible Run

on: # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      check-mode:
        description: "Run in dry-run mode (ansible --check)"
        required: false
        default: false
        type: boolean
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      VAULT_PASSWORD:
        required: true
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ansible-playbook:
    name: Ansible Playbook
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        host:
          - amedee.be
          - box.vangasse.eu

    concurrency:
      group: ${{ format(
        'ansible-run-{0}-{1}-{2}',
        (inputs.check-mode && 'check-' || ''),
        matrix.host,
        github.ref) }}
      cancel-in-progress: true

    env:
      ANSIBLE_CONFIG: ansible.cfg
      ANSIBLE_STDOUT_CALLBACK: json
      CHECK_MODE_INPUT: ${{ inputs.check-mode }}

    steps:
      - name: Collect Workflow Telemetry
        # yamllint disable-line rule:line-length
        uses: tsviz/actions-runner-telemetry@0fbec1ca185a193c94e4540e244110fdee912693 # v1.7.3

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Restore Ansible cache
        uses: ./.github/actions/restore-ansible-cache

      - name: Determine Ansible check mode
        id: set_check_mode
        run: |
          # Normalize the input to lowercase
          normalized="$(echo "${CHECK_MODE_INPUT:-false}" | tr '[:upper:]' '[:lower:]')"

          if [[ "$normalized" == "true" ]]; then
            # Always dry-run if input explicitly true
            check="--check"
          else
            if [[ "$GITHUB_EVENT" == "workflow_dispatch" ]]; then
              echo "check_mode=" >> "$GITHUB_OUTPUT"
            elif [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
              echo "check_mode=" >> "$GITHUB_OUTPUT"
            else
              echo "check_mode=--check" >> "$GITHUB_OUTPUT"
            fi
          fi

          echo "check_mode=$check" >> "$GITHUB_OUTPUT"
          echo "🛠️ Ansible check mode set to: '$check'"
        env:
          GITHUB_EVENT: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}

      - name: Deploy changes to servers
        shell: bash
        run: |
          .github/scripts/ansible-retry.sh > ansible-result.json
        env:
          ANSIBLE_HOST: ${{ matrix.host }}
          ANSIBLE_STDOUT_CALLBACK: json
          CHECK_MODE: ${{ steps.set_check_mode.outputs.check_mode }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VAULT_PASSWORD: ${{ secrets.VAULT_PASSWORD }}

      - name: Inspect Ansible output
        if: always()
        run: |
          echo "===== first 30 lines ====="
          head -30 ansible-result.json || true
          echo
          echo "===== last 30 lines ====="
          tail -30 ansible-result.json || true

      - name: Generate Ansible summary
        if: always()
        run: |
          python3 .github/scripts/ansible_summary.py ansible-result.json >> "$GITHUB_STEP_SUMMARY"

      - name: Archive Ansible log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ format(
            'ansible-{0}{1}.log',
            steps.set_check_mode.outputs.check_mode,
            matrix.host) }}
          path: ~/.ansible/ansible.log
          compression-level: 9
          overwrite: true

      - name: checkrun-timechart
        # yamllint disable-line rule:line-length
        uses: urcomputeringpal/checkrun-timechart-action@9de4251d7983342ccf09b84ed921326887571853 # v0.0.8
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          SUMMARY: "true"
