---
name: 🚀 Ansible Run

on: # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      check-mode:
        description: "Run in dry-run mode (ansible --check)"
        required: false
        default: false
        type: boolean
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      VAULT_PASSWORD:
        required: true
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ansible-playbook:
    name: Ansible Playbook
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        host:
          - amedee.be
          - box.vangasse.eu

    concurrency:
      group: ${{ format(
        'ansible-run-{0}-{1}-{2}',
        (inputs.check-mode && 'check-' || ''),
        matrix.host,
        github.ref) }}
      cancel-in-progress: true

    env:
      ANSIBLE_CONFIG: ansible.cfg
      ANSIBLE_STDOUT_CALLBACK: yaml
      CHECK_MODE_INPUT: ${{ inputs.check-mode }}
      GITHUB_EVENT: ${{ github.event_name }}
      GITHUB_REF: ${{ github.ref }}

    steps:
      - name: Collect Workflow Telemetry
        # yamllint disable-line rule:line-length
        uses: catchpoint/workflow-telemetry-action@94c3c3d9567a0205de6da68a76c428ce4e769af1 # v2.0.0

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Restore Ansible cache
        uses: ./.github/actions/restore-ansible-cache

      - name: Create controlmasters directory
        run: mkdir --parents ~/.ssh/controlmasters

      - name: Determine Ansible check mode
        id: set_check_mode
        run: |
          # Normalize the input to lowercase
          normalized="$(echo "${CHECK_MODE_INPUT:-false}" | tr '[:upper:]' '[:lower:]')"

          if [[ "$normalized" == "true" ]]; then
            # Always dry-run if input explicitly true
            check="--check"
          else
            case "$GITHUB_EVENT" in
              workflow_dispatch)
                check=""  # always real run
                ;;
              workflow_call|*)
                # Only real run on main branch, otherwise dry-run
                if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
                  check=""
                else
                  check="--check"
                fi
                ;;
            esac
          fi

          echo "check_mode=$check" >> "$GITHUB_OUTPUT"
          echo "🛠️ Ansible check mode set to: '$check'"

      - name: Deploy changes to servers
        shell: bash
        run: |
          set -euo pipefail

          MAX_ATTEMPTS=5
          BASE_SLEEP=5
          VAULT_FILE="$(mktemp)"
          if [[ -n "${CHECK_MODE:-}" ]]; then
            ansible_args+=("$CHECK_MODE")
          fi


          cleanup() {
            shred -u "$VAULT_FILE" 2>/dev/null || rm -f "$VAULT_FILE"
            ssh-agent -k >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          # -----------------------------
          # 🔐 Vault password handling
          # -----------------------------
          echo "${VAULT_PASSWORD}" > "$VAULT_FILE"
          chmod 600 "$VAULT_FILE"

          # -----------------------------
          # 🔐 SSH agent setup
          # -----------------------------
          eval "$(ssh-agent -s)" >/dev/null
          printf '%s\n' "${SSH_PRIVATE_KEY}" | tr -d '\r' | ssh-add - >/dev/null

          export ANSIBLE_CONFIG=ansible.cfg
          export ANSIBLE_STDOUT_CALLBACK=json

          is_retryable_ssh_error() {
            grep -Eqi \
            'UNREACHABLE!|FAILED.*ssh|Connection (timed out|refused|reset)|' \
            "$1" || return 1

            grep -Eqi \
            'Could not resolve hostname|No route to host|SSH connection|' \
            "$1" || return 1

            grep -Eqi \
            'Temporary failure in name resolution' \
            "$1"
          }

          print_ssh_context() {
            echo "----- SSH/network failure context -----"
            grep -Ei \
              'UNREACHABLE|ssh|timeout|refused|reset|No route|Temporary failure' \
              "$1" || true
            echo "----------------------------------------"
          }

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "🚀 Ansible attempt $attempt/$MAX_ATTEMPTS"

            LOG=$(mktemp)

            if ansible-playbook playbooks/site.yml \
              --inventory inventory/production \
              --limit "${{ matrix.host }}" \
              "${ansible_args[@]}" \
              --vault-password-file "$VAULT_FILE" \
              -vv 2>&1 | tee "$LOG"; then

              echo "✅ Success on attempt $attempt"
              exit 0
            fi

            echo "❌ Attempt $attempt failed"

            # -------------------------------------------------
            # 🚨 Decide retry vs fail immediately
            # -------------------------------------------------
            if ! is_retryable_ssh_error "$LOG"; then
              echo "💥 Non-retryable failure detected — not retrying"
              print_ssh_context "$LOG"
              exit 1
            fi

            # -------------------------------------------------
            # 🔍 SSH/network failure (retryable)
            # -------------------------------------------------
            print_ssh_context "$LOG"

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              JITTER=$((RANDOM % 5))
              WAIT=$((BASE_SLEEP + JITTER))

              echo "🔁 Retryable SSH issue detected"
              echo "⏳ Sleeping ${WAIT}s (base=${BASE_SLEEP}, jitter=${JITTER})"

              sleep "$WAIT"
              BASE_SLEEP=$((BASE_SLEEP * 2))
              continue
            fi

            echo "💥 Max retries reached"
            exit 1
          done
        env:
          CHECK_MODE: ${{ steps.set_check_mode.outputs.check_mode }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VAULT_PASSWORD: ${{ secrets.VAULT_PASSWORD }}

      - name: Archive Ansible log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ format(
            'ansible-{0}{1}.log',
            steps.set_check_mode.outputs.check_mode,
            matrix.host) }}
          path: ~/.ansible/ansible.log
          compression-level: 9
          overwrite: true

      - name: checkrun-timechart
        # yamllint disable-line rule:line-length
        uses: urcomputeringpal/checkrun-timechart-action@9de4251d7983342ccf09b84ed921326887571853 # v0.0.8
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          SUMMARY: "true"
