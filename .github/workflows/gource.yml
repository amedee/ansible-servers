---
name: 📽️ Gource

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_interval_hours:
        description: Skip interval in hours (default 24)
        required: false
        default: "24"

concurrency:
  group: gource-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  BUCKET: gource-by-amedee
  AWS_REGION: us-east-1
  METADATA_KEY: metadata/last-generated.json

jobs:
  gource:
    name: Generate, upload, and publish Gource video
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout full repository history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Decide whether to run Gource
        id: check
        env:
          HOURS: ${{ github.event.inputs.skip_interval_hours }}
        run: |
          set -Eeuo pipefail
          IFS=$'\n\t'

          SKIP_HOURS="${HOURS:-24}"
          SKIP_SECONDS=$((SKIP_HOURS * 3600))

          RUN_JOB=false

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "Manual trigger → run"
            RUN_JOB=true
          fi

          if [[ "$RUN_JOB" == false ]]; then
            if aws s3 cp \
              "s3://${BUCKET}/${METADATA_KEY}" \
              metadata.json >/dev/null 2>&1; then

              LAST_GENERATED="$(jq -r '.generated_at' metadata.json)"
              NOW="$(date +%s)"
              AGE=$((NOW - LAST_GENERATED))

              if (( AGE > SKIP_SECONDS )); then
                echo "Interval expired → run"
                RUN_JOB=true
              else
                echo "Interval not expired → skip"
              fi
            else
              echo "No metadata found → run"
              RUN_JOB=true
            fi
          fi

          echo "run_job=${RUN_JOB}" >> "${GITHUB_OUTPUT}"

      - name: Generate Gource video
        if: steps.check.outputs.run_job == 'true'
        uses: nbprojekt/gource-action@57256d303c5a9a5e72ed92ba13e3e83c5ec8b257 # v1.3.0
        with:
          avatars_auto_fetch: true
          gource_title: ${{ github.repository }}
          logo_url: 'https://amedee.be/wp-content/uploads/2022/12/Carbon_Glider_by_mientefuego_150x150.png'

      - name: Install FFmpeg
        if: steps.check.outputs.run_job == 'true'
        uses: AnimMouse/setup-ffmpeg@ae28d57dabbb148eff63170b6bf7f2b60062cbae # v1.2.3

      - name: Generate thumbnail GIF
        if: steps.check.outputs.run_job == 'true'
        run: |
          set -euo pipefail

          ffmpeg \
            -y \
            -i ./gource/gource.mp4 \
            -filter_complex \
              "[0:v]select='not(mod(n,60))',setpts=0.1*PTS,fps=10,scale=320:-1:flags=lanczos" \
            -fps_mode vfr \
            ./gource/gource.gif

      - name: Upload assets to S3
        if: steps.check.outputs.run_job == 'true'
        run: |
          set -Eeuo pipefail
          IFS=$'\n\t'

          upload() {
            local ext="$1"
            local mime="$2"

            local file="./gource/gource.${ext}"
            local versioned="gource-${GITHUB_SHA}.${ext}"
            local latest="gource-latest.${ext}"

            aws s3 cp \
              "$file" \
              "s3://${BUCKET}/${versioned}" \
              --content-type "$mime"

            aws s3api copy-object \
              --bucket "$BUCKET" \
              --copy-source "${BUCKET}/${versioned}" \
              --key "$latest" \
              --metadata-directive REPLACE \
              --content-type "$mime"
          }

          upload mp4 video/mp4
          upload gif image/gif

      - name: Update S3 metadata (clean JSON)
        if: steps.check.outputs.run_job == 'true'
        run: |
          set -Eeuo pipefail
          IFS=$'\n\t'

          jq -n \
            --arg commit_sha "$GITHUB_SHA" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg generated_at "$(date +%s)" \
            '{
              generated_at: ($generated_at | tonumber),
              commit_sha: $commit_sha,
              repository: $repository
            }' > metadata.json

          aws s3 cp \
            metadata.json \
            "s3://${BUCKET}/${METADATA_KEY}" \
            --content-type application/json

      - name: Generate summary and GitHub comment
        if: steps.check.outputs.run_job == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -Eeuo pipefail
          IFS=$'\n\t'

          VIDEO_URL="https://${BUCKET}.s3.${AWS_REGION}.amazonaws.com/gource-${GITHUB_SHA}.mp4"
          THUMB_URL="https://${BUCKET}.s3.${AWS_REGION}.amazonaws.com/gource-${GITHUB_SHA}.gif"

          FILE_SIZE="$(stat -c '%s' ./gource/gource.mp4)"
          FILE_SIZE="$(numfmt --to=iec-i --suffix=B "${FILE_SIZE}")"

          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_DATE=$(git log -1 --date=short --format=%cd)

          SUMMARY_LINES=(
            "### 📽️ Gource video upload summary"
            ""
            "![Preview](${THUMB_URL})"
            ""
            "- **Public URL:** [View video](${VIDEO_URL})"
            "- **File size:** ${FILE_SIZE}"
            "- **Commit:** \`${GITHUB_SHA}\` – ${COMMIT_MSG}"
            "- **Commit date:** ${COMMIT_DATE}"
          )

          SUMMARY="$(printf "%s\n" "${SUMMARY_LINES[@]}")"

          printf "%s\n" "${SUMMARY}" >> "${GITHUB_STEP_SUMMARY}"

          gh api \
            "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/comments" \
            --raw-field body="$SUMMARY"
