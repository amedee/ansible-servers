---
name: 🤖 Pre-commit autoupdate

on: # yamllint disable-line rule:truthy
  schedule:
    - cron: "0 3 * * 1" # Every Monday at 03:00 UTC
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/pre-commit-autoupdate.yml"
      - ".pre-commit-config.yaml"

permissions:
  contents: write
  pull-requests: write

jobs:
  autoupdate:
    name: ⏫ Pre-commit autoupdate
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: ⏬ Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true

      - name: 🐍 Setup Python and Install Dependencies
        uses: ./.github/actions/setup-python-pip
        with:
          python-version: "3.13"
          requirements-file: "requirements.txt"

      - name: 💾 Cache pre-commit environment
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: 📦 Install pre-commit
        run: pip install pre-commit

      - name: 🧹 Run pre-commit autoupdate
        run: pre-commit autoupdate

      - name: Stage changed file
        run: git add .pre-commit-config.yaml

      - name: Check if there are changes
        id: changes
        run: |
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 📤 Extract staged git diff
        id: diff_outputs
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git diff --cached > diff.txt

          printf "diff_content<<EOF\n%s\nEOF\n" "$(cat diff.txt)" >> "$GITHUB_OUTPUT"

          {
            echo "### 🔍 Diff"
            echo
            echo '```diff'
            cat diff.txt
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: 🤖 Generate AI commit message
        id: ai_commit
        if: steps.changes.outputs.has_changes == 'true'
        uses: ./.github/actions/ai-commit-message
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          diff_content: ${{ steps.diff_outputs.outputs.diff_content }}
          prompt_content: |
            Write a concise Git commit message describing the staged changes
            to the configuration of pre-commit hooks in .pre-commit-config.yaml.
            Say something about the specific hooks that were updated.

      - name: Ensure commit message exists
        if: steps.changes.outputs.has_changes == 'true'
        env:
          AI_MESSAGE: ${{ steps.ai_commit.outputs.message }}
        run: |
          if [ -z "$AI_MESSAGE" ]; then
            echo "AI commit message missing. Aborting workflow."
            exit 1
          fi

      - name: 🔁 Commit, push, and PR
        if: steps.changes.outputs.has_changes == 'true'
        uses: ./.github/actions/create-or-update-pr
        with:
          branch: chore/pre-commit-autoupdate
          commit_message: ${{ steps.ai_commit.outputs.message }}
          pr_title: "⬆️ Pre-commit autoupdate"
          pr_body: ${{ steps.ai_commit.outputs.message }}
          github_token: ${{ secrets.ANSIBLE_DEP_UPDATER_TOKEN }}
          git_user_name: "github-actions[bot]"
          git_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
