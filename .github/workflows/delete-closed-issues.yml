---
name: Delete Closed Issues

on: # yamllint disable-line rule:truthy
  schedule:
    - cron: "0 0 2 * *" # Runs at midnight UTC on the second day of the month
  workflow_dispatch: # Allow manual execution
    inputs:
      dry_run:
        description: "Enable dry run mode (preview deletions, no actual delete)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      days_to_keep:
        description: "Number of days to retain closed issues"
        required: false
        default: "90"
        type: string
      min_issues_to_keep:
        description: "Minimum number of closed issues to keep"
        required: false
        default: "10"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  issues: write # ✅ Required to delete issues

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check GraphQL API Rate Limit
        id: check_rate_limit
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const query = `
              query {
                rateLimit {
                  limit
                  cost
                  remaining
                  resetAt
                }
              }
            `;
            const result = await github.graphql(query);
            const { limit, cost, remaining, resetAt } = result.rateLimit;

            core.info(`GraphQL Rate Limit: ${remaining}/${limit} remaining`);
            core.info(`Query Cost: ${cost}`);
            core.info(`Rate Limit resets at: ${resetAt}`);
            core.setOutput('remaining', remaining);

      - name: Skip deletion due to low rate limit
        if: steps.check_rate_limit.outputs.remaining != '' && steps.check_rate_limit.outputs.remaining < 10
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const summary = `### ⚠️ Skipped GitHub Issue Cleanup\n` +
              `- **Reason**: GraphQL API rate limit too low.`;
            core.info('⚠️ Skipping deletion: GraphQL API rate limit is too low.');
            core.setOutput('summary', summary);
            core.summary.addRaw(summary).write();

      - name: Delete old closed issues
        if: steps.check_rate_limit.outputs.remaining != '' && steps.check_rate_limit.outputs.remaining >= 10
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_FINEGRAINED_PAT }}
          DRY_RUN: ${{ inputs.dry_run }}
          DAYS_TO_KEEP: ${{ inputs.days_to_keep }}
          MIN_ISSUES_TO_KEEP: ${{ inputs.min_issues_to_keep }}
        with:
          script: |
            const dryRun = process.env.DRY_RUN === 'true';
            const daysToKeep = parseInt(process.env.DAYS_TO_KEEP || '90', 10);
            const minIssuesToKeep = parseInt(process.env.MIN_ISSUES_TO_KEEP || '10', 10);
            core.info(`🧪 raw input dry_run: ${process.env.DRY_RUN}`);
            core.info(`🧪 raw input days_to_keep: ${process.env.DAYS_TO_KEEP}`);
            core.info(`🧪 raw input min_issues_to_keep: ${process.env.MIN_ISSUES_TO_KEEP}`);
            core.info(`🛠️ Config: dryRun=${dryRun}, daysToKeep=${daysToKeep}, minIssuesToKeep=${minIssuesToKeep}`);

            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const now = new Date();
            const thresholdDate = new Date(now.getTime() - daysToKeep * 24 * 60 * 60 * 1000);
            core.info(`📅 Threshold date for deletion: ${thresholdDate.toISOString()}`);

            async function getClosedIssues() {
              let page = 1;
              const perPage = 100;
              let issues = [];

              while (true) {
                const response = await github.rest.issues.listForRepo({
                  owner,
                  repo,
                  state: 'closed',
                  per_page: perPage,
                  page
                });

                const pageIssues = response.data.filter(issue =>
                  !issue.pull_request &&
                  issue.labels.some(label => label.name === 'github-workflows-metrics')
                );

                issues = issues.concat(pageIssues);
                if (response.data.length < perPage) break;
                page++;
              }

              return issues;
            }

            function selectIssuesToDelete(issues) {
              return issues
                .filter(issue => new Date(issue.closed_at) < thresholdDate)
                .sort((a, b) => new Date(b.closed_at) - new Date(a.closed_at))
                .slice(minIssuesToKeep)
                .map(issue => ({ number: issue.number, node_id: issue.node_id }));
            }

            async function deleteIssues(issues) {
              for (const issue of issues) {
                const mutation = `
                  mutation {
                    deleteIssue(input: {issueId: \"${issue.node_id}\" }) {
                      repository {
                        id
                      }
                    }
                  }`;

                try {
                  await github.graphql(mutation);
                  core.info(`🗑️ Deleted issue #${issue.number}`);
                } catch (err) {
                  core.warning(`Failed to delete issue #${issue.number}: ${err.message}`);
                }
              }
            }

            const issues = await getClosedIssues();

            core.info(`📦 Total closed issues with label "github-workflows-metrics": ${issues.length}`);

            // 🔍 Log sample closed dates
            if (issues.length > 0) {
              core.startGroup('🔍 Sample issue closed dates:');
              issues.slice(0, 5).forEach(issue =>
                core.info(`#${issue.number} closed at ${issue.closed_at}`)
              );
              core.endGroup();
            }

            if (issues.length === 0) {
              core.info('✅ No closed issues found.');
              return;
            }

            const issuesToDelete = selectIssuesToDelete(issues);

            core.info(`🔍 Closed issues older than threshold: ${issues.filter(issue => new Date(issue.closed_at) < thresholdDate).length}`);
            core.info(`🔍 Issues selected for deletion (after keeping ${minIssuesToKeep}): ${issuesToDelete.length}`);

            if (issuesToDelete.length === 0) {
              core.info('✅ No issues to delete.');
              return;
            }

            core.startGroup('Issues to delete:');
            for (const issue of issuesToDelete) {
              core.info(`#${issue.number}`);
            }
            core.endGroup();

            if (dryRun) {
              core.info('🛑 DRY RUN ENABLED: Issues will NOT be deleted.');
              return;
            }

            await deleteIssues(issuesToDelete);

            const summary = `### 🗑️ GitHub Issue Cleanup Summary\n` +
              `- **Deleted Issues**: ${issuesToDelete.length}\n` +
              `- **Remaining Closed Issues**: ${issues.length - issuesToDelete.length}`;

            core.setOutput('summary', summary);
            core.summary.addRaw(summary).write();
