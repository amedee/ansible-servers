---
name: 📊 Workflow Metrics

on: # yamllint disable-line rule:truthy
  schedule:
    - cron: "0 3 * * *" # Runs daily at 03:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  issues: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # yamllint disable-line rule:line-length
      - uses: yykamei/github-workflows-metrics@f79ad4a1ff5f537d85f8b132eb31846226d93f82 # v0.4.3
        with:
          only: pipeline.yml
          status: success
