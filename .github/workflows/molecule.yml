---
name: 🧪 Molecule Tests

on: # yamllint disable-line rule:truthy
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ${{ format(
    'molecule-{0}-{1}',
    github.workflow,
    github.event_name == 'pull_request' && github.head_ref || github.ref) }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  discover:
    name: Discover Molecule scenarios
    runs-on: ubuntu-latest

    outputs:
      scenarios: ${{ steps.discover.outputs.scenarios }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Discover scenarios
        id: discover
        run: |
          scenarios=$(
            find roles -type f -path "*/molecule/*/molecule.yml" \
            | sed 's#/molecule.yml##' \
            | jq -R -s -c 'split("\n")[:-1]'
          )

          echo "scenarios=${scenarios}" >> "${GITHUB_OUTPUT}"

          echo "Discovered scenarios:"
          echo "${scenarios}" | jq .

  molecule:
    name: Molecule (${{ matrix.scenario }})
    needs: discover

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJson(needs.discover.outputs.scenarios) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Restore Ansible cache
        uses: ./.github/actions/restore-ansible-cache

      - name: Install Molecule and plugins
        run: |
          python -m pip install --upgrade pip
          pip install molecule molecule-plugins

      - name: Run Molecule
        run: |
          role_dir="$(dirname "$(dirname "${MATRIX_SCENARIO}")")"
          scenario_name="$(basename "${MATRIX_SCENARIO}")"

          echo "Role directory: ${role_dir}"
          echo "Scenario: ${scenario_name}"

          cd "${role_dir}"
          molecule test -s "${scenario_name}"
        env:
          MATRIX_SCENARIO: ${{ matrix.scenario }}
