---
name: 🧪🧼🚀 Wash, Test, Deploy

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
    paths:
      - "**"
      - "!**/*.md"
      - "!.github/workflows/ansible-doctor.yml"
      - "!.github/workflows/gource.yml"
      - "!.pre-commit-config.yaml"
  schedule:
    - cron: "10 3 * * SAT"
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preheat-ansible-cache:
    name: 🔥 Preheat Ansible Cache
    uses: ./.github/workflows/preheat-ansible-cache.yml

  super-linter:
    name: 🛠️ Code Quality — Super-Linter
    permissions:
      contents: read
      issues: write
      packages: read
      pull-requests: write
      statuses: write
    uses: ./.github/workflows/code-quality-super-linter.yml
    needs: preheat-ansible-cache
    secrets:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      ANSIBLE_DEP_UPDATER_TOKEN: ${{ secrets.ANSIBLE_DEP_UPDATER_TOKEN }}

  eslint:
    name: 🛠️ Code Quality — ESLint
    uses: ./.github/workflows/code-quality-eslint.yml

  pylint:
    name: 🛠️ Code Quality — Pylint
    uses: ./.github/workflows/code-quality-pylint.yml

  validate-configs:
    name: 🛠️ Code Quality — Validate Configs
    uses: ./.github/workflows/code-quality-validate-configs.yml

  pre-commit:
    name: 🛠️ Code Quality — Pre-Commit
    uses: ./.github/workflows/code-quality-pre-commit.yml

  ansible-lint:
    name: 🛠️ Code Quality — Ansible Lint
    uses: ./.github/workflows/code-quality-ansible-lint.yml
    needs: preheat-ansible-cache

  molecule:
    name: 🧪 Molecule Tests
    uses: ./.github/workflows/molecule.yml
    needs: preheat-ansible-cache

  detect-changes:
    name: 🔎 Detect production changes
    runs-on: ubuntu-latest
    outputs:
      production: ${{ steps.filter.outputs.production }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            production:
              - 'inventory/**'
              - 'playbooks/**'
              - 'roles/**'
              - 'ansible.cfg'
              - 'requirements.yml'
              - '.github/workflows/ansible-run.yml'
              - '.github/workflows/pipeline.yml'
              - '!**/molecule/**'
              - '!**/*.md'

  deploy:
    name: 🚀 Deploy to Production
    if: needs.detect-changes.outputs.production == 'true'
    uses: ./.github/workflows/ansible-run.yml
    needs:
      - detect-changes
      - preheat-ansible-cache
      - super-linter
      - ansible-lint
      - molecule
      - eslint
      - pylint
      - validate-configs
      - pre-commit
    with:
      check-mode: false
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      VAULT_PASSWORD: ${{ secrets.VAULT_PASSWORD }}
