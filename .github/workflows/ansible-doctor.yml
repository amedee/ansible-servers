---
name: 📚 Ansible Role Docs

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ansible-doctor.yml"
      - "roles/**/defaults/main.yml"
      - "roles/**/meta/main.yml"
  workflow_dispatch:

concurrency:
  group: ansible-doctor-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 🐍 Setup Python and Install Dependencies
        uses: ./.github/actions/setup-python-pip
        with:
          python-version: "3.13"
          requirements-file: "requirements-docs.txt"

      - name: Run ansible-doctor
        run: ansible-doctor --force --recursive roles

      - name: 📦 Cache npm
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: npm-cache-prettier
          restore-keys: |
            npm-cache-

      - name: Format Markdown with Prettier
        run: |
          npx prettier --prose-wrap always --print-width 80 --write "roles/**/README.md"

      - name: Stage generated README files
        run: git add roles/*/README.md

      - name: Detect generated README changes
        id: changes
        run: |
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 📤 Extract staged git diff
        id: diff_outputs
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git diff --cached > diff.txt

          printf "diff_content<<EOF\n%s\nEOF\n" "$(cat diff.txt)" >> "$GITHUB_OUTPUT"

          {
            echo "### 🔍 Diff"
            echo
            echo '```diff'
            cat diff.txt
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: 🤖 Generate AI commit message
        id: ai_commit
        if: steps.changes.outputs.has_changes == 'true'
        uses: ./.github/actions/ai-commit-message
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          diff_content: ${{ steps.diff_outputs.outputs.diff_content }}
          prompt_content: |
            Write a concise Git commit message describing the staged changes
            to Markdown documentation of Ansible roles.

      - name: Ensure commit message exists
        if: steps.changes.outputs.has_changes == 'true'
        env:
          AI_MESSAGE: ${{ steps.ai_commit.outputs.message }}
        run: |
          if [ -z "$AI_MESSAGE" ]; then
            echo "AI commit message missing. Aborting workflow."
            exit 1
          fi

      - name: 🔁 Commit, push, and PR
        uses: ./.github/actions/create-or-update-pr
        if: steps.changes.outputs.has_changes == 'true'
        with:
          branch: >-
            ${{ github.event_name == 'workflow_dispatch'
                && github.ref_name != 'main'
                && github.ref_name
                || 'chore/ansible-docs' }}
          create_pr: >-
            ${{ !(github.event_name == 'workflow_dispatch'
                && github.ref_name != 'main') }}
          commit_message: ${{ steps.ai_commit.outputs.message }}
          pr_title: "📚️ Update Ansible role docs"
          pr_body: ${{ steps.ai_commit.outputs.message }}
          github_token: ${{ secrets.ANSIBLE_DEP_UPDATER_TOKEN }}
          git_user_name: "github-actions[bot]"
          git_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
