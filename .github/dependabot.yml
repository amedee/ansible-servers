---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: ".github/workflows"
    schedule:
      interval: "weekly"
  
  - package-ecosystem: "github-actions"
    directory: ".github/actions"
    schedule:
      interval: "weekly"
  
  - package-ecosystem: "npm"
    directory: ".github/actions/ai-commit-message"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
