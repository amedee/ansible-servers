[defaults]
allow_broken_conditionals = True
allow_world_readable_tmpfiles = True
callbacks_enabled = timer
forks = 2
host_key_checking = False
inventory = inventory/production
log_path = ~/.ansible/ansible.log
remote_tmp = /tmp
result_format = yaml
retry_files_enabled = False
roles_path = roles
stdout_callback = default
strategy = free
timeout = 60

[privilege_escalation]
become = True
become_method = sudo

[retry_files]
enable = False

[ssh_connection]
pipelining = True
retries = 3
ssh_args = -o ConnectTimeout=10 -o ConnectionAttempts=3 -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30
usetty = False
