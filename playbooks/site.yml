---
- name: Base configuration for all hosts
  hosts: all
  gather_facts: false

  pre_tasks:
    - name: Gather minimal facts for swapfile, postfix, ufw, munin-node
      ansible.builtin.setup:
        filter:
          - ansible_hostname
          - ansible_os_family
          - ansible_system_capabilities
          - ansible_system_capabilities_enforced
          - ansible_virtualization_role
        gather_subset:
          - virtual
          - hardware
          - network

    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ hostname }}"

    - name: Disable APT Phasing
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/99disable-phasing
        content: 'APT::Get::Always-Include-Phased-Updates "true";'
        owner: root
        group: root
        mode: "0644"

    - name: Add rsyslog logrotate config
      ansible.builtin.copy:
        src: rsyslog-logrotate
        dest: /etc/logrotate.d/rsyslog
        owner: root
        group: root
        mode: "0644"

  roles:
    - swapfile
    - localepurge
    - hadori
    - debops.debops.etckeeper
    - debops.debops.etc_aliases
    - debops.debops.apt_listchanges
    - debops.debops.unattended_upgrades
    - apt_keyrings

    - role: install_software
      vars:
        install_software_apt_packages: >-
          {{
            (apt_packages_base | default([]))
            + (apt_packages_extra | default([]))
          }}
    - debops.debops.reboot

    - role: munin_node
      vars:
        munin_node_config: >-
          {{
            (munin_node_config_base | default({}))
            | combine(munin_node_config_extra | default({}), recursive=True)
          }}
        munin_node_install_plugins: >-
          {{
            (munin_node_install_plugins_base | default([]))
            + (munin_node_install_plugins_extra | default([]))
          }}
        munin_node_plugins: >-
          {{
            (munin_node_plugins_base | default([]))
            + (munin_node_plugins_extra | default([]))
          }}

    - postfix

- name: Configure Mail-in-a-Box servers
  hosts: mailservers
  gather_facts: false

  pre_tasks:
    - name: Gather minimal facts for ufw
      ansible.builtin.setup:
        filter:
          - ansible_os_family

  roles:
    - debops.debops.environment
    - imapsync
    - mailinabox_dns
    - mailinabox_dovecot
    - mailinabox_duplicity
    - mailinabox_ufw
    - munin

- name: Configure WordPress servers
  hosts: blogs
  gather_facts: false

  roles:
    - mysql_config
    - redis
    - nginx
    - letsencrypt
    - role: debops.debops.keyring
      keyring__dependent_gpg_keys:
        - id: 63AF7AA15067C05616FDDD88A3A2E8F226F0BC06
    - debops.debops.wpcli
    - wp
