---
- name: Install MySQL
  ansible.builtin.apt:
    name: mysql-server
    state: present

- name: Disable binary logging in MySQL
  when: mysql_disable_binary_logging
  community.general.ini_file:
    path: /etc/mysql/mysql.conf.d/mysqld.cnf
    section: mysqld
    option: disable_log_bin
    allow_no_value: true
    create: false
    owner: root
    group: root
    mode: "0644"
  notify: Restart mysql
