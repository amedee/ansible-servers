---
- name: Create custom DNS directory
  ansible.builtin.file:
    path: /home/user-data/dns
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Copy custom DNS settings
  ansible.builtin.copy:
    src: custom.yaml
    dest: /home/user-data/dns/custom.yaml
    owner: root
    group: root
    mode: "0644"
  notify: DNS update
