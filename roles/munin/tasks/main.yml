---
- name: Install Munin
  ansible.builtin.apt:
    name:
      - munin

- name: Add Munin host configurations
  ansible.builtin.copy:
    src: munin-conf.d/
    dest: /etc/munin/munin-conf.d/
    owner: root
    group: root
    mode: "0644"
  notify: Restart munin

- name: Remove duplicate Munin host configuration
  community.general.ini_file:
    path: /etc/munin/munin.conf
    section: box.vangasse.eu
    state: absent
    owner: root
    group: root
    mode: "0644"
  notify: Restart munin

- name: Fix Munin cgi-tmp cleanup user
  ansible.builtin.replace:
    path: /etc/cron.d/munin
    regexp: 'www-data cgitmpdir='
    replace: 'munin cgitmpdir='
    backup: true
