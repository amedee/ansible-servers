---
- name: Ensure UFW is installed
  ansible.builtin.apt:
    name: ufw

- name: Ensure UFW is enabled
  community.general.ufw:
    state: enabled

- name: Allow outgoing SMTP traffic (port 25 redirect rule via NAT)
  ansible.builtin.blockinfile:
    path: /etc/ufw/before.rules
    backup: true
    insertafter: "^COMMIT"
    block: |
      *nat
      :POSTROUTING ACCEPT [0:0]
      # Redirect outgoing SMTP traffic (port 25) to localhost
      -A OUTPUT -p tcp --dport 25 -j DNAT --to-destination 127.0.0.1:25
      COMMIT
  notify: Reload UFW

- name: Ensure UFW allows forwarding
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: "^DEFAULT_FORWARD_POLICY="
    line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'
  notify: Reload UFW

- name: Enable IP forwarding for UFW
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: "^IP_FORWARD="
    line: 'IP_FORWARD="yes"'
  notify: Reload UFW
