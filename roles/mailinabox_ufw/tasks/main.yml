---
- name: Ensure UFW is installed
  ansible.builtin.apt:
    name:
      - ufw

- name: Ensure UFW is enabled
  community.general.ufw:
    state: enabled

# Mail-in-a-Box checks outbound SMTP connectivity by connecting to TCP/25.
# Some cloud providers block outbound TCP/25, causing the check to fail.
# Since this server sends mail via AWS SES instead of direct SMTP, redirect
# the connection to localhost so the health check succeeds.
- name: Redirect outgoing SMTP traffic to localhost
  ansible.builtin.blockinfile:
    path: /etc/ufw/before.rules
    backup: true
    insertafter: "^COMMIT"
    block: |
      *nat
      :POSTROUTING ACCEPT [0:0]
      # Redirect outgoing SMTP traffic (port 25) to localhost
      -A OUTPUT -p tcp --dport 25 -j DNAT --to-destination 127.0.0.1:25
      COMMIT
  notify: Reload UFW

- name: Configure UFW forwarding
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - regexp: "^DEFAULT_FORWARD_POLICY="
      line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'
    - regexp: "^IP_FORWARD="
      line: 'IP_FORWARD="yes"'
  notify: Reload UFW
