---
- name: Configure nginx upstream repository
  ansible.builtin.deb822_repository:
    name: nginx
    types:
      - deb
    uris:
      - https://nginx.org/packages/ubuntu
    suites:
      - "{{ ansible_distribution_release }}"
    components:
      - nginx
    signed_by: https://nginx.org/keys/nginx_signing.key

- name: Configure Sury PHP repository
  ansible.builtin.deb822_repository:
    name: sury-php
    types:
      - deb
    uris:
      - https://packages.sury.org/php/
    suites:
      - "{{ ansible_distribution_release }}"
    components:
      - main
    signed_by: https://packages.sury.org/php/apt.gpg

- name: Configure nginx APT pinning
  ansible.builtin.copy:
    src: pin_nginx.pref
    dest: /etc/apt/preferences.d/pin_nginx.pref
    owner: root
    group: root
    mode: "0644"

- name: Configure PHP APT pinning
  ansible.builtin.copy:
    src: pin_php.pref
    dest: /etc/apt/preferences.d/pin_php.pref
    owner: root
    group: root
    mode: "0644"

- name: Install Nginx and PHP
  ansible.builtin.apt:
    name:
      - nginx
      - php
      - php-fpm
    update_cache: true
    cache_valid_time: 86400 # One day
    lock_timeout: 300 # 5 minutes

- name: Copy gzip config file
  ansible.builtin.copy:
    src: gzip.conf
    dest: /etc/nginx/conf.d/
    owner: root
    group: root
    mode: "0644"
  notify: Restart nginx

- name: Copy website config file
  ansible.builtin.template:
    src: website.j2
    dest: /etc/nginx/sites-available/{{ hostname }}
    owner: root
    group: root
    mode: "0644"
  notify: Restart nginx

- name: Delete DigitalOcean website config
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/digitalocean
    state: absent
  notify: Restart nginx

- name: Create a symbolic link
  ansible.builtin.file:
    src: /etc/nginx/sites-available/{{ hostname }}
    dest: /etc/nginx/sites-enabled/default
    owner: root
    group: root
    state: link
  notify: Restart nginx

- name: "Check existence of webserver directory {{ webserver_directory }}"
  ansible.builtin.file:
    path: "{{ webserver_directory }}"
    state: directory
    owner: "{{ webserver_user }}"
    group: "{{ webserver_user }}"
    mode: "0755"

- name: Configure logrotate for nginx logs
  ansible.builtin.import_tasks: logrotate.yml
