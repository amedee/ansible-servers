---
- name: Copy gzip config file
  ansible.builtin.copy:
    src: gzip.conf
    dest: /etc/nginx/conf.d/
    owner: root
    group: root
    mode: "0644"
  notify: Restart nginx

- name: Copy website config file
  ansible.builtin.template:
    src: website.j2
    dest: /etc/nginx/sites-available/{{ hostname }}
    owner: root
    group: root
    mode: "0644"
  notify: Restart nginx

- name: Delete DigitalOcean website config
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/digitalocean
    state: absent
  notify: Restart nginx

- name: Create a symbolic link
  ansible.builtin.file:
    src: /etc/nginx/sites-available/{{ hostname }}
    dest: /etc/nginx/sites-enabled/default
    owner: root
    group: root
    state: link
  notify: Restart nginx

- name: "Check existence of webserver directory {{ webserver_directory }}"
  ansible.builtin.file:
    path: "{{ webserver_directory }}"
    state: directory
    owner: "{{ webserver_user }}"
    group: "{{ webserver_user }}"
    mode: "0755"

- name: Configure logrotate for nginx logs
  ansible.builtin.import_tasks: logrotate.yml
