---
- name: Install imapsync prerequisites
  ansible.builtin.apt:
    name: "{{ imapsync_packages }}"
    state: present

- name: Install Mail::IMAPClient Perl module
  community.general.cpanm:
    name: Mail::IMAPClient

- name: Install imapsync script
  ansible.builtin.get_url:
    url: "{{ imapsync_upstream_url }}"
    dest: "{{ imapsync_install_path }}"
    mode: '0755'
    timeout: 30
  retries: 3
  delay: 10
  register: imapsync_download
  until: imapsync_download is succeeded
